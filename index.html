<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">

<title>A Gift I Made Just For You 💜</title>

<style>

padding:0;

height:100vh;
display:flex;

color:white;
text-align:center;

.card{
max-width:400px;

h1{

p{

button{
background:white;
color:#7b2cbf;
padding:15px 35px;
border:none;

font-weight:bold;
cursor:pointer;

button:hover{

}
</style>

</head>

<body>

<div class="card">
